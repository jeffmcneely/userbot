AWSTemplateFormatVersion: '2010-09-09'
Description: 'UserBot Lambda function with S3, API Gateway, and SSM parameter access'

Parameters:
  Prefix:
    Type: String
    Description: Prefix for resource naming
    Default: userbot

Resources:
  # DynamoDB Table for storing event data
  UserBotTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${Prefix}-events'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: eventname
          AttributeType: S
      KeySchema:
        - AttributeName: eventname
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # IAM Role for Lambda execution
  UserBotRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${Prefix}-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                Resource:
                  - !GetAtt UserBotTable.Arn
        - PolicyName: SSMAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource:
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${Prefix}/*'
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${Prefix}/*'

  # CloudWatch Logs Group for Lambda with 30-day retention
  SlackTattleFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${Prefix}-slack-tattle'
      RetentionInDays: 30

  # Lambda Function
  SlackTattleFunction:
    Type: AWS::Lambda::Function
    DependsOn: SlackTattleFunctionLogGroup
    Properties:
      FunctionName: !Sub '${Prefix}-slack-tattle'
      Runtime: python3.14
      Handler: handler.lambda_handler
      Role: !GetAtt UserBotRole.Arn
      Code:
        S3Bucket: !Sub 'lambda-deployments-${AWS::AccountId}'
        S3Key: !Sub '${Prefix}/slack_tattle.zip'
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref UserBotTable
          PREFIX: !Sub ${Prefix}
      TracingConfig:
        Mode: Active

  # API Gateway REST API
  UserBotApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${Prefix}-api'
      Description: API Gateway for UserBot Lambda
      EndpointConfiguration:
        Types:
          - REGIONAL

  # API Gateway Resource
  ApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref UserBotApi
      ParentId: !GetAtt UserBotApi.RootResourceId
      PathPart: webhook

  # API Gateway Method
  ApiMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref UserBotApi
      ResourceId: !Ref ApiResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${SlackTattleFunction.Arn}/invocations'

  # Lambda Permission for API Gateway
  ApiGatewayInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SlackTattleFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${UserBotApi}/*/*'

  # API Gateway Deployment
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ApiMethod
    Properties:
      RestApiId: !Ref UserBotApi
      StageName: prod

Outputs:
  ApiGatewayEndpoint:
    Description: API Gateway endpoint URL for UserBot
    Value: !Sub 'https://${UserBotApi}.execute-api.${AWS::Region}.amazonaws.com/prod/webhook'
    Export:
      Name: !Sub '${Prefix}-api-endpoint'

  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt SlackTattleFunction.Arn
    Export:
      Name: !Sub '${Prefix}-lambda-arn'
